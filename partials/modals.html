<!-- ════════════════════════════════════
     MODALS
════════════════════════════════════ -->

<!-- Détail produit -->
<div class="modal-overlay" id="modal-pdl" onclick="closeModal('modal-pdl')">
  <div class="modal" style="padding:0;border-radius:26px 26px 0 0;overflow:hidden" onclick="event.stopPropagation()">
    <div id="pdl-content"></div>
    <button class="modal-x" onclick="closeModal('modal-pdl')">✕</button>
  </div>
</div>

<!-- Panier -->
<div class="modal-overlay" id="modal-cart" onclick="closeModal('modal-cart')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3>🛒 Mon Panier</h3>
    <div id="cart-items"></div>
    <div id="cart-footer"></div>
  </div>
</div>

<!-- Menu utilisateur / Profil -->
<div class="modal-overlay" id="modal-user" onclick="closeModal('modal-user')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="um-info">
      <div class="um-av" id="um-av">👤</div>
      <div>
        <div class="um-name"  id="um-name">Non connecté</div>
        <div class="um-email" id="um-email">Connectez-vous pour plus de fonctionnalités</div>
      </div>
    </div>
    <!-- Boutons si NON connecté -->
    <div id="um-out">
      <button class="btn-primary" onclick="closeModal('modal-user');navigateScreen('login')"    style="margin-bottom:10px">Se connecter</button>
      <button class="btn-outline"  onclick="closeModal('modal-user');navigateScreen('register')">Créer un compte</button>
    </div>
    <!-- Menu si connecté -->
    <div id="um-in" style="display:none">
      <button class="menu-item" onclick="toast('Mes commandes — bientôt disponible')"><span class="mi">📦</span>Mes commandes</button>
      <button class="menu-item" onclick="toast('Mes favoris — bientôt disponible')">  <span class="mi">❤️</span>Mes favoris</button>
      <button class="menu-item" onclick="toast('Paramètres — bientôt disponible')">   <span class="mi">⚙️</span>Paramètres</button>
      <div class="divider"></div>
      <button class="menu-item danger" onclick="closeModal('modal-user');firebaseLogout()"><span class="mi">🚪</span>Déconnexion</button>
    </div>
  </div>
</div>

<!-- ✅ Ajouter un produit (vendeur) — avec upload image -->
<div class="modal-overlay" id="modal-ap" onclick="closeModal('modal-ap')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h3>➕ Ajouter un produit</h3>
    <div class="error-msg" id="ap-err"></div>

    <!-- Photo du produit -->
    <div class="fg">
      <label>📸 Photo du produit (optionnel)</label>
      <label class="file-input-label">
        <span id="ap-image-label">📁 Choisir une image…</span>
        <input type="file" id="ap-image" accept="image/*"
          onchange="document.getElementById('ap-image-label').textContent = this.files[0]?.name || '📁 Choisir une image…'">
      </label>
      <div class="image-preview" id="ap-image-preview"></div>
    </div>

    <!-- Icône emoji (si pas d'image) -->
    <div class="fg">
      <label>Icône (si pas de photo)</label>
      <div class="emoji-row">
        <button class="em-btn active" onclick="setEmoji(this,'📦')">📦</button>
        <button class="em-btn" onclick="setEmoji(this,'📱')">📱</button>
        <button class="em-btn" onclick="setEmoji(this,'💻')">💻</button>
        <button class="em-btn" onclick="setEmoji(this,'👗')">👗</button>
        <button class="em-btn" onclick="setEmoji(this,'👜')">👜</button>
        <button class="em-btn" onclick="setEmoji(this,'💄')">💄</button>
        <button class="em-btn" onclick="setEmoji(this,'🏠')">🏠</button>
        <button class="em-btn" onclick="setEmoji(this,'🥗')">🥗</button>
        <button class="em-btn" onclick="setEmoji(this,'⚽')">⚽</button>
        <button class="em-btn" onclick="setEmoji(this,'🎧')">🎧</button>
        <button class="em-btn" onclick="setEmoji(this,'👟')">👟</button>
        <button class="em-btn" onclick="setEmoji(this,'🧴')">🧴</button>
      </div>
      <input type="hidden" id="ap-emoji" value="📦">
    </div>

    <div class="fg"><label>Nom du produit *</label><input type="text" id="ap-name" placeholder="Ex : iPhone 15 Pro 256Go"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg"><label>Prix (FCFA) *</label>        <input type="number" id="ap-price" placeholder="195000"></div>
      <div class="fg"><label>Prix original (si promo)</label><input type="number" id="ap-orig"  placeholder="220000"></div>
    </div>
    <div class="fg">
      <label>Catégorie *</label>
      <select id="ap-cat">
        <option value="">-- Choisir --</option>
        <option>Électronique</option>
        <option>Vêtements</option>
        <option>Accessoires</option>
        <option>Beauté</option>
        <option>Maison</option>
        <option>Alimentation</option>
        <option>Sport</option>
      </select>
    </div>
    <div class="fg"><label>Description *</label><textarea id="ap-desc" placeholder="Décrivez votre produit (caractéristiques, état, dimensions…)"></textarea></div>
    <div class="fg"><label>Localisation</label><input type="text" id="ap-loc" placeholder="Ex : Cotonou, Bénin"></div>
    <button id="btn-ap" class="btn-primary" data-label="Publier le produit" onclick="submitProduct()">Publier le produit</button>
  </div>
</div>
