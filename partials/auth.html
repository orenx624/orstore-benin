<!-- ════════════════════════════════════
     ÉCRAN 2 — CONNEXION
════════════════════════════════════ -->
<div id="sc-login" class="screen">
  <div class="auth-top">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1><em>Or</em>Store Bénin</h1>
  </div>
  <div class="auth-body">
    <h2>Connexion à votre compte</h2>
    <div class="error-msg" id="log-err"></div>
    <div class="fg"><label>Identifiant ou email</label><input type="text" id="log-email" placeholder="admin ou votre@email.com"></div>
    <div class="fg"><label>Mot de passe</label><input type="password" id="log-pw" placeholder="••••••••"></div>
    <button id="btn-log" class="btn-primary" data-label="Se connecter" onclick="firebaseLogin()">Se connecter</button>
    <p class="auth-link">Pas encore de compte ? <a onclick="navigateScreen('register')">S'inscrire</a></p>
    <p class="auth-link" style="margin-top:10px"><a onclick="goBack()" style="color:var(--muted)">← Retour</a></p>
  </div>
</div>

<!-- ════════════════════════════════════
     ÉCRAN 3 — INSCRIPTION
════════════════════════════════════ -->
<div id="sc-register" class="screen">
  <div class="auth-top">
    <button class="back-btn" onclick="goBack()">←</button>
    <h1>Inscription — <em>Or</em>Store</h1>
  </div>
  <div class="auth-body">
    <h2>Créer un compte OrStore Bénin</h2>
    <div class="error-msg" id="reg-err"></div>
    <div class="fg"><label>Nom et Prénoms *</label><input type="text" id="reg-name" placeholder="Ex : Koffi Amédé Jean"></div>
    <div class="fg"><label>Email *</label><input type="email" id="reg-email" placeholder="votre@email.com"></div>
    <div class="fg"><label>Téléphone</label><input type="tel" placeholder="+229 97 00 00 00"></div>
    <div class="fg"><label>Mot de passe * (min. 6 car.)</label><input type="password" id="reg-pw" placeholder="••••••••"></div>
    <div class="fg"><label>Confirmer le mot de passe *</label><input type="password" id="reg-pw2" placeholder="••••••••"></div>
    <button id="btn-reg" class="btn-primary" data-label="S'inscrire" onclick="firebaseRegister()">S'inscrire</button>
    <p class="auth-link">Déjà un compte ? <a onclick="navigateScreen('login')">Se connecter</a></p>
  </div>
</div>
